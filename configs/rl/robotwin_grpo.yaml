base_inference_config: configs/inference/robotwin.yaml

# Server overrides
port: 29546
save_root: experiments/robotwin_grpo
action_guidance_scale: 1

rl:
  reward:
    type: sparse_success

  # Rollout/debug path uses split servers by default, not FSDP.
  use_fsdp: false
  group_size: 2
  rollout_groups_per_update: 1
  update_epochs: 1
  batch_size: 2

  action_noise_std: 0.05
  clip_range: 0.2
  target_kl: null
  entropy_coef: 0.0
  bc_coef: 0.0
  checkpoint_interval: 1
  export_inference_checkpoint: true
  max_grad_norm: 1.0
  validate_logprob_consistency: false
  logprob_consistency_atol: 5.0e-3

  optimizer:
    lr: 1.0e-6
    weight_decay: 0.0
    betas: [0.9, 0.95]

  logprob:
    normalize_denoising_horizon: true
    normalize_action_dim: true

  # Set true for protocol/storage smoke tests that should avoid optimizer work.
  disable_updates: false
