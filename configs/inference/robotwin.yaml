mode: server

# Model
# Local path on the 4090 eval nodes (weights replicated to same path per node).
model_name_or_path: /home/quser/models/lingbot-va-posttrain-robotwin
param_dtype: bfloat16
patch_size: [1, 2, 2]
# 4090 (24GB): offload VAE + text_encoder to CPU to fit (~24GB per README).
enable_offload: true
vae_offload: true

# Server
host: 0.0.0.0
port: 29536

# Schedulers (must match training)
snr_shift: 5.0
action_snr_shift: 1.0

# Inference
attn_window: 72
frame_chunk_size: 2
env_type: robotwin_tshape
height: 256
width: 320
action_dim: 30
action_per_frame: 16
guidance_scale: 5
action_guidance_scale: 1
num_inference_steps: 25
video_exec_step: -1
action_num_inference_steps: 50

obs_cam_keys:
  - observation.images.cam_high
  - observation.images.cam_left_wrist
  - observation.images.cam_right_wrist

# Action channel mapping. inverse_used_action_channel_ids is computed at
# load time from this list (see src/inference/server.py:_compute_inverse_ids).
used_action_channel_ids: [0, 1, 2, 3, 4, 5, 6, 28, 7, 8, 9, 10, 11, 12, 13, 29]

