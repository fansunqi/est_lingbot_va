mode: train
experiment_name: &experiment_name wan_va_robotwin_lr1e-5_steps50000

system: src.system.flow_match_va.FlowMatchVASystem
components:
  model: !inc model/wan_va_default.yaml
  data: !inc data/robotwin_lerobot.yaml

model_name_or_path: /path/to/pretrained/model
resume_from: null
save_root: ./experiments

loss:
  latent_loss: 1.0
  action_loss: 1.0

noisy_cond_prob: 0.5

optimizer:
  __target__: AdamW
  learning_rate: 1.0e-5
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.1
  fused: true
  warmup_steps: 10
  lr_schedule: warmup_constant

trainer:
  max_steps: 50000
  precision: bf16-mixed
  gradient_clip_val: 2.0
 #accumulate_grad_batches: 2
  accelerator: gpu
  devices: auto                  # all visible GPUs; override with --devices N
  num_nodes: 1                   # multinode launcher overrides via env
  log_every_n_steps: 1
  num_sanity_val_steps: 0

callbacks:
  gc_interval: 500

wandb:
  mode: online                   # online | offline | disabled
  name: *experiment_name
  project: lingbot-new
  entity: Robotics-FiT

checkpoint:
  every_n_train_steps: 1000
  save_top_k: -1
  save_last: true
